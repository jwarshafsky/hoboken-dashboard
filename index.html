<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Hoboken Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: #0a0a0f;
    color: #e8e8ec;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto 2fr 1fr 1fr;
    gap: 12px;
    padding: 16px;
  }

  /* Clock - full width */
  .clock-section {
    grid-column: 1 / -1;
    text-align: center;
    padding: 6px 0;
  }

  .time {
    font-size: 5rem;
    font-weight: 200;
    letter-spacing: 0.02em;
    line-height: 1;
    color: #fff;
  }

  .date-line {
    font-size: 1.1rem;
    font-weight: 300;
    color: #888;
    margin-top: 2px;
  }

  /* Cards */
  .card {
    background: #151520;
    border-radius: 16px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid #1e1e2e;
  }

  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    margin-bottom: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  /* Weather - takes up more space */
  .weather-card {
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: 1fr auto;
    gap: 0 12px;
  }

  .weather-main {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .weather-top {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .weather-icon { font-size: 3rem; line-height: 1; }

  .weather-temp {
    font-size: 3.5rem;
    font-weight: 200;
    color: #fff;
    line-height: 1;
  }

  .weather-temp-c {
    font-size: 1.3rem;
    font-weight: 200;
    color: #888;
    line-height: 1;
  }

  .weather-desc {
    font-size: 1.1rem;
    color: #aaa;
    margin-top: 4px;
  }

  .weather-details {
    grid-column: 1 / -1;
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: #777;
    padding-top: 8px;
    border-top: 1px solid #1e1e2e;
    margin-top: 8px;
  }

  .weather-details span { color: #bbb; }

  .weather-forecast {
    display: flex;
    flex-direction: column;
    gap: 3px;
    overflow: hidden;
    border-left: 1px solid #1e1e2e;
    padding-left: 12px;
    justify-content: center;
  }

  .weather-hour {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .weather-hour .wh-time {
    font-size: 0.7rem;
    color: #666;
    min-width: 30px;
  }

  .weather-hour .wh-icon {
    font-size: 0.9rem;
    line-height: 1;
  }

  .weather-hour .wh-temp {
    font-size: 0.85rem;
    font-weight: 500;
    color: #ccc;
  }

  /* Hop card */
  .hop-card {
    display: flex;
    flex-direction: column;
  }

  .hop-etas {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
  }

  .hop-eta-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .hop-eta-time {
    font-size: 1.4rem;
    font-weight: 300;
    color: #fff;
  }

  .hop-eta-label {
    font-size: 0.7rem;
    font-weight: 500;
    color: #6bffb8;
  }

  .hop-no-service {
    font-size: 0.9rem;
    color: #444;
    margin-top: 8px;
  }

  /* Transit cards - full width */
  .transit-card {
    grid-column: 1 / -1;
    flex-direction: row;
    align-items: center;
    gap: 16px;
    padding: 16px 18px;
    min-height: 90px;
  }

  .transit-icon {
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  .transit-icon svg {
    width: 36px;
    height: 36px;
    fill: #555;
  }

  .transit-body {
    flex: 1;
    min-width: 0;
  }

  .transit-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    margin-bottom: 4px;
  }

  .transit-routes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 24px;
    align-items: center;
  }

  .route-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .route-label {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #555;
    white-space: nowrap;
  }

  .dep-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .dep-chip {
    display: flex;
    align-items: baseline;
    gap: 5px;
    background: #1a1a2a;
    padding: 4px 10px;
    border-radius: 8px;
  }

  .dep-chip:first-child {
    background: #1a2a1a;
  }

  .dep-chip .t {
    font-size: 1.1rem;
    font-weight: 400;
    color: #fff;
  }

  .dep-chip:first-child .t {
    font-size: 1.25rem;
  }

  .dep-chip .cd {
    font-size: 0.65rem;
    font-weight: 500;
  }

  .tunnel-traffic {
    flex-shrink: 0;
    text-align: center;
    padding: 4px 16px;
    border-left: 1px solid #1e1e2e;
    margin-left: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 90px;
  }

  .tunnel-label {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #555;
    margin-bottom: 4px;
  }

  .tunnel-time {
    font-size: 2rem;
    font-weight: 300;
    color: #fff;
    line-height: 1;
  }

  .tunnel-min {
    font-size: 0.7rem;
    color: #888;
    margin-bottom: 2px;
  }

  .tunnel-status {
    font-size: 0.6rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .no-service {
    font-size: 0.9rem;
    color: #444;
  }

  .refresh-note {
    position: fixed;
    bottom: 4px;
    right: 12px;
    font-size: 0.55rem;
    color: #282828;
  }

  @media (max-width: 800px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto auto auto auto;
    }
    .transit-card { flex-direction: column; align-items: flex-start; }
    .time { font-size: 3.5rem; }
    .weather-temp { font-size: 3rem; }
  }
</style>
</head>

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  const h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  document.getElementById('clock').textContent = `${h12}:${m} ${ampm}`;

  const opts = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
  document.getElementById('dateLine').textContent = now.toLocaleDateString('en-US', opts);
}

    const data = await res.json();
    const cw = data.current_weather;
    const code = WMO_CODES[cw.weathercode] || ["Unknown", "?"];

    const tempF = Math.round(cw.temperature);
    const tempC = Math.round((tempF - 32) * 5 / 9);
    document.getElementById('weatherTemp').innerHTML = `${tempF}&deg;F`;
    document.getElementById('weatherTempC').innerHTML = `${tempC}&deg;C`;
    document.getElementById('weatherDesc').textContent = code[0];
    document.getElementById('weatherIcon').textContent = code[1];
    document.getElementById('weatherWind').textContent = Math.round(cw.windspeed);
    document.getElementById('weatherHi').textContent = Math.round(data.daily.temperature_2m_max[0]);
    document.getElementById('weatherLo').textContent = Math.round(data.daily.temperature_2m_min[0]);

    const nowHour = new Date().getHours();
    const humidity = data.hourly.relativehumidity_2m
      ? data.hourly.relativehumidity_2m[nowHour]
      : (data.hourly.relative_humidity_2m ? data.hourly.relative_humidity_2m[nowHour] : '--');
    document.getElementById('weatherHumidity').textContent = humidity;

    // Hourly forecast for rest of day
    const hourlyTemps = data.hourly.temperature_2m;
    const hourlyCodes = data.hourly.weathercode;
    if (hourlyTemps && hourlyCodes) {
      let fhtml = '';
      // Show every 2-3 hours from now until end of day
      for (let h = nowHour + 2; h <= 23; h += 3) {
        const t = Math.round(hourlyTemps[h]);
        const ic = WMO_CODES[hourlyCodes[h]] || ['?', '?'];
        const ampm = h >= 12 ? 'p' : 'a';
        const h12 = h % 12 || 12;
        fhtml += `<div class="weather-hour"><span class="wh-time">${h12}${ampm}</span><span class="wh-icon">${ic[1]}</span><span class="wh-temp">${t}&deg;</span></div>`;
      }
      document.getElementById('weatherForecast').innerHTML = fhtml;
    }
  } catch (e) {
    document.getElementById('weatherDesc').textContent = 'Error loading weather';
  }
}

// ============================================================
// TRANSIT HELPERS
// ============================================================
function timeToMinutes(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + m;
}

function nowMinutes() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function formatTime12(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  const ampm = h >= 12 ? 'p' : 'a';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2, '0')}${ampm}`;
}

function minutesUntil(timeStr) {
  let diff = timeToMinutes(timeStr) - nowMinutes();
  // After-midnight service (00:05, 01:35 etc) should show as upcoming if it's late night
  // But early morning times (5am+) should NOT wrap around at 11pm
  if (diff < 0 && timeToMinutes(timeStr) < 180) {
    // Destination time is before 3am ‚Äî treat as late-night continuation
    diff += 24 * 60;
  }
  return diff;
}

function countdownText(mins) {
  if (mins <= 0) return 'now';
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? `${h}h${m}m` : `${h}h`;
}

function isWeekend() {
  const day = new Date().getDay();
  return day === 0 || day === 6;
}

function isSunday() {
  return new Date().getDay() === 0;
}

function getNextDepartures(times, count) {
  const upcoming = times.filter(t => minutesUntil(t) >= 0);
  upcoming.sort((a, b) => minutesUntil(a) - minutesUntil(b));
  return upcoming.slice(0, count);
}

function renderDepartures(times, label) {
  const next = getNextDepartures(times, 3);
  if (times.length === 0) {
    return `<div class="route-group"><div class="route-label">${label}:</div><div class="no-service">No service today</div></div>`;
  }
  if (next.length === 0) {
    return `<div class="route-group"><div class="route-label">${label}:</div><div class="no-service">Done for today</div></div>`;
  }
  let html = `<div class="route-group"><div class="route-label">${label}:</div><div class="dep-row">`;
  for (const t of next) {
    const mins = minutesUntil(t);
    const cdColor = mins <= 5 ? '#ff6b6b' : '#6bffb8';
    html += `<div class="dep-chip"><span class="t">${formatTime12(t)}</span><span class="cd" style="color:${cdColor}">${countdownText(mins)}</span></div>`;
  }
  html += '</div></div>';
  return html;
}

// ============================================================
// BUS (static fallback)
// ============================================================
// 15th & Willow is ~2 min after 14th & Bloomfield on the 126 route
function get126WillowSchedule() {
  let base;
  if (isSunday()) base = BUS_126_SCHEDULE.sunday;
  else if (isWeekend()) base = BUS_126_SCHEDULE.saturday;
  else base = BUS_126_SCHEDULE.weekday;
  return base.map(t => {
    let mins = timeToMinutes(t) + 2;
    if (mins >= 24 * 60) mins -= 24 * 60;
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
  });
}

function get119Schedule() {
  if (isWeekend()) return BUS_119_SCHEDULE.saturday; // empty ‚Äî no weekend service
  return BUS_119_SCHEDULE.weekday;
}

function get126BloomfieldSchedule() {
  if (isSunday()) return BUS_126_SCHEDULE.sunday;
  if (isWeekend()) return BUS_126_SCHEDULE.saturday;
  return BUS_126_SCHEDULE.weekday;
}

function updateBusStatic() {
  const container = document.getElementById('busContent');
  let html = '';
  html += renderDepartures(get126BloomfieldSchedule(), '126 @ 14th & Bloomfield');
  html += renderDepartures(get119Schedule(), '119 @ 15th & Willow');
  container.innerHTML = html;
}

// ============================================================
// PROXY FETCH ‚Äî live bus + tunnel data
// ============================================================
function renderLivePredictions(predictions, label) {
  if (!predictions || predictions.error) {
    return `<div class="route-group"><div class="route-label">${label}:</div><div class="no-service">Error</div></div>`;
  }
  if (Array.isArray(predictions) && predictions.length > 0) {
    let html = `<div class="route-group"><div class="route-label">${label}:</div><div class="dep-row">`;
    const items = predictions.slice(0, 3);
    for (const p of items) {
      const mins = parseInt(p.countdown, 10);
      const cdColor = mins <= 5 ? '#ff6b6b' : '#6bffb8';
      const timeStr = p.eta ? p.eta.split(' ').pop() : '';  // "YYYYMMDD HH:MM" -> "HH:MM"
      const displayTime = timeStr ? formatTime12(timeStr) : `${mins}m`;
      html += `<div class="dep-chip"><span class="t">${displayTime}</span><span class="cd" style="color:${cdColor}">${countdownText(mins)}</span></div>`;
    }
    html += '</div></div>';
    return html;
  }
  // Fallback for unparsed data
  return `<div class="route-group"><div class="route-label">${label}:</div><div class="no-service">No predictions</div></div>`;
}

async function fetchProxy() {
  if (!PROXY_URL) return;
  try {
    const res = await fetch(PROXY_URL);
    const data = await res.json();

    // Update tunnel traffic
    if (data.tunnel && !data.tunnel.error) {
      const t = data.tunnel;
      document.getElementById('tunnelTime').textContent = t.travelTime || '--';
      const statusEl = document.getElementById('tunnelStatus');
      statusEl.textContent = t.status || '';
      statusEl.style.color = t.travelTime && parseInt(t.travelTime) > 15 ? '#ff6b6b' : '#6bffb8';
    }

    // Update bus predictions
    if (data.stops) {
      const container = document.getElementById('busContent');
      let html = '';

      const stop20490 = data.stops['20490'];
      if (stop20490 && Array.isArray(stop20490.predictions) && stop20490.predictions.length > 0) {
        html += renderLivePredictions(stop20490.predictions, '126 @ 14th & Bloomfield');
      } else {
        // Fall back to static schedule
        let schedule;
        if (isSunday()) schedule = BUS_126_SCHEDULE.sunday;
        else if (isWeekend()) schedule = BUS_126_SCHEDULE.saturday;
        else schedule = BUS_126_SCHEDULE.weekday;
        html += renderDepartures(schedule, '126 @ 14th & Bloomfield');
      }

      const stop32084 = data.stops['32084'];
      if (stop32084 && Array.isArray(stop32084.predictions) && stop32084.predictions.length > 0) {
        // Filter out 126 buses that are the same bus as 14th & Bloomfield
        // (within 3 min of a 14th prediction). Keep 119s and unique 126 Willow variants.
        const preds14 = (stop20490 && Array.isArray(stop20490.predictions)) ? stop20490.predictions : [];
        const etaMins14 = preds14.filter(p => p.route === '126').map(p => parseInt(p.countdown, 10));
        const filtered = stop32084.predictions.filter(p => {
          if (p.route !== '126') return true; // always keep 119 etc
          const mins = parseInt(p.countdown, 10);
          // If this 126 is within 3 min of a 14th prediction, it's the same bus
          return !etaMins14.some(m14 => Math.abs(mins - m14) <= 3);
        });
        if (filtered.length > 0) {
          html += renderLivePredictions(filtered, '15th & Willow');
        } else {
          html += renderDepartures(get119Schedule(), '119 @ 15th & Willow');
        }
      } else {
        html += renderDepartures(get119Schedule(), '119 @ 15th & Willow');
      }

      container.innerHTML = html;
    }

    // Update Hop ETAs
    if (data.hop && data.hop['158942']) {
      renderHopEtas(data.hop['158942'].etas);
    }
  } catch (e) {
    console.error('Proxy fetch error:', e);
  }
}

// ============================================================
// FERRY
// ============================================================
function updateFerries() {
  const container = document.getElementById('ferryContent');
  const we = isWeekend();
  let html = '';
  for (const [name, sched] of Object.entries(FERRY_SCHEDULES)) {
    const times = we ? sched.weekend : sched.weekday;
    html += renderDepartures(times, name);
  }
  container.innerHTML = html;
}

// ============================================================
// HOBOKEN HOP
// ============================================================
function renderHopEtas(data) {
  const container = document.getElementById('hopContent');
  if (!data) { container.innerHTML = '<div class="hop-no-service">No data</div>'; return; }
  if (data.status === 'no vehicles') {
    container.innerHTML = '<div class="hop-no-service">No vehicles running</div>';
    return;
  }
  if (data.error) {
    container.innerHTML = '<div class="hop-no-service">Error</div>';
    return;
  }
  if (Array.isArray(data) && data.length > 0) {
    let html = '';
    for (const e of data.slice(0, 3)) {
      // Add 1 min offset: Fox Hill Gardens -> 12th & Garden
      let eta = e.eta || '';
      const minsMatch = eta.match(/^(\d+)\s*min/i);
      if (minsMatch) {
        const adjusted = parseInt(minsMatch[1], 10) + 1;
        eta = `${adjusted} min`;
      }
      html += `<div class="hop-eta-item"><span class="hop-eta-time">${eta}</span></div>`;
    }
    container.innerHTML = html;
    return;
  }
  container.innerHTML = '<div class="hop-no-service">No vehicles running</div>';
}

// ============================================================
// INIT
// ============================================================
function updateTransit() {
  if (PROXY_URL) {
    fetchProxy();
  } else {
    updateBusStatic();
  }
  updateFerries();
}

updateClock();
updateTransit();
updateWeather();
setInterval(updateClock, 1000);
setInterval(updateTransit, 60000);  // 1-minute refresh for transit
setInterval(updateWeather, 600000);
</script>
